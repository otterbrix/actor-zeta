name: Debug GCC Args

on:
  pull_request:
  push:
    branches:
      - main
      - feature/*

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  debug-gcc-args:
    strategy:
      matrix:
        configuration: [
          {"UBUNTU_VERSION":"22.04", "TOOLCHAIN_VERSION":"11"},
          {"UBUNTU_VERSION":"22.04", "TOOLCHAIN_VERSION":"12"},
          {"UBUNTU_VERSION":"22.04", "TOOLCHAIN_VERSION":"13"}
        ]

    runs-on: ubuntu-latest
    container:
      image: ubuntu:${{matrix.configuration.UBUNTU_VERSION}}

    steps:
      - uses: actions/checkout@v3

      - name: Install system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt update && apt-get install -y \
            software-properties-common ca-certificates \
            ninja-build make zlib1g-dev wget \
            python3-pip python3 python3-dev python3-setuptools

          add-apt-repository ppa:ubuntu-toolchain-r/test

          bash ./docker/gcc/pyinstall.sh $(cat /etc/os-release | grep -a UBUNTU_CODENAME | sed -e 's/UBUNTU_CODENAME=//g')

          python3 -m pip install --upgrade pip
          python3 -m pip install --no-cache-dir "conan==2.*" cmake==3.25.0

      - name: Install compiler
        run: |
          apt update && apt-get install -y gcc-${{matrix.configuration.TOOLCHAIN_VERSION}} g++-${{matrix.configuration.TOOLCHAIN_VERSION}}
          update-alternatives \
            --install /usr/bin/gcc gcc /usr/bin/gcc-${{matrix.configuration.TOOLCHAIN_VERSION}} 90 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-${{matrix.configuration.TOOLCHAIN_VERSION}} \
            --slave /usr/bin/gcov gcov /usr/bin/gcov-${{matrix.configuration.TOOLCHAIN_VERSION}}
          update-alternatives --config gcc

      - name: Show compiler version
        run: |
          echo "=== GCC Version ==="
          gcc --version
          g++ --version

      - name: Configure CMake
        env:
          CC: gcc-${{matrix.configuration.TOOLCHAIN_VERSION}}
          CXX: g++-${{matrix.configuration.TOOLCHAIN_VERSION}}
          BUILD_TYPE: Debug
          CXX_STANDARD: 20
        run: |
          conan profile detect --force
          conan install . --output-folder=build/Debug -s build_type=Debug --build=missing

          TOOLCHAIN_PATH="$(pwd)/build/Debug/conan_toolchain.cmake"

          cmake -S . -B build/Debug -GNinja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_STANDARD=20 \
            -DCMAKE_C_COMPILER=${CC} \
            -DCMAKE_CXX_COMPILER=${CXX} \
            -DALLOW_TESTS=ON \
            -DALLOW_BENCHMARK=ON \
            -DEXCEPTIONS_DISABLE=ON \
            -DRTTI_DISABLE=ON \
            -DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN_PATH}

      - name: Build debug test
        run: cmake --build build/Debug --target tests_gcc_args_check

      - name: Build dispatch_overhead benchmark (check warnings)
        run: |
          echo "========================================"
          echo "=== Building benchmark_dispatch_overhead ==="
          echo "========================================"
          cmake --build build/Debug --target benchmark_dispatch_overhead 2>&1 | tee build_dispatch_overhead.log
          echo "========================================"
          echo "=== Warnings from build: ==="
          grep -i "warning" build_dispatch_overhead.log || echo "No warnings found"
          echo "========================================"

      - name: Run debug test with verbose output
        working-directory: build/Debug
        run: |
          echo "========================================"
          echo "=== GCC ${{matrix.configuration.TOOLCHAIN_VERSION}} - operator new Args Debug ==="
          echo "========================================"
          ./test/gcc-args-check/tests_gcc_args_check --success 2>&1 || true
          echo "========================================"
          echo "=== End of debug output ==="
          echo "========================================"

      - name: Run non_copy_obj test
        working-directory: build/Debug
        run: |
          echo "========================================"
          echo "=== non_copy_obj test ==="
          echo "========================================"
          ./test/non_copy_obj/tests_non_copiable_objects --success 2>&1 || echo "Test failed (expected on GCC)"